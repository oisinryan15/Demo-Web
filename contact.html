<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="Styles/contact.css">

    <script src="Scripts/contact.js" defer></script>
    <script src="Scripts/darkMode.js" defer></script>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
    </nav>
    <div style="margin: 2em 0;" class="access-controls">
        <button id="darkModeBtn">Change Theme</button>
        <label for="fontSlider" style="margin-left:2em;">Text Size:</label>
        <input type="range" id="fontSlider" min="14" max="32" value="18" style="vertical-align:middle;">
        <label for="fontSelect" style="margin-left:2em;">Font:</label>
        <select id="fontSelect">
            <option value="Arial, sans-serif">Arial</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="Tahoma, sans-serif">Tahoma</option>
            <option value="Courier New, monospace">Courier New</option>
        </select>
    </div>
    <!-- form to send email -->
    <h1>Get in touch with me!</h1>
    <form id="contactForm">
        <label for="user-email">Your Email:</label><br>
        <!-- I didn't know that "type = email" requires the user to have a valid email address and you can't just type in any text so that's cool -->
        <input type="email" id="user-email" name="Email" required><br><br>

        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="Subject" required><br><br>

        <label for="body">Message:</label><br>
        <textarea id="body" name="Body" rows="5" required></textarea><br><br>

        <button type="submit">Send</button>
    </form>
</body>
</html>
